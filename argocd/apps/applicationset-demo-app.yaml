# Dev ApplicationSet — auto-sync to poc-dev
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-app-dev
  namespace: cicd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/managed-by: argocd
spec:
  generators:
    - list:
        elements:
          - namespace: poc-dev
            valuesFile: values-dev.yaml
  template:
    metadata:
      name: demo-app-dev
      annotations:
        notifications.argoproj.io/subscribe.on-sync-succeeded.slack: ""
        notifications.argoproj.io/subscribe.on-sync-failed.slack: ""
        notifications.argoproj.io/subscribe.on-health-degraded.slack: ""
      labels:
        environment: dev
    spec:
      project: demo-app
      source:
        repoURL: https://github.com/sreekanthgorrela96/demo-app-deploy.git
        targetRevision: main
        path: demo-app
        helm:
          valueFiles:
            - "{{valuesFile}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
---
