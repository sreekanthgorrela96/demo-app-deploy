# Dev ApplicationSet — auto-sync to poc-dev
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-app-dev
  namespace: cicd
spec:
  generators:
    - list:
        elements:
          - namespace: poc-dev
            valuesFile: values-dev.yaml
  template:
    metadata:
      name: demo-app-dev
    spec:
      project: demo-app
      source:
        repoURL: https://github.com/sreekanthgorrela96/demo-app-deploy.git
        targetRevision: main
        path: demo-app
        helm:
          valueFiles:
            - "{{valuesFile}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
---
# QA ApplicationSet — manual sync gate for poc-qa
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-app-qa
  namespace: cicd
spec:
  generators:
    - list:
        elements:
          - namespace: poc-qa
            valuesFile: values-qa.yaml
  template:
    metadata:
      name: demo-app-qa
    spec:
      project: demo-app
      source:
        repoURL: https://github.com/sreekanthgorrela96/demo-app-deploy.git
        targetRevision: main
        path: demo-app
        helm:
          valueFiles:
            - "{{valuesFile}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
